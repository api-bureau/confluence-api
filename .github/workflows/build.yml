name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/ApiBureau.Confluence.Api/ApiBureau.Confluence.Api.csproj

      - name: Build
        run: dotnet build src/ApiBureau.Confluence.Api/ApiBureau.Confluence.Api.csproj --configuration Release --no-restore